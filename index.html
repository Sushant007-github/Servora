/* =====================
   COUNTDOWN HOOK
   ===================== */
function useCountdown(secs){
  var [t,setT]=useState(secs);
  useEffect(function(){var id=setInterval(function(){setT(function(x){return x>0?x-1:0;});},1000);return function(){clearInterval(id);};}, []);
  var h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;
  function pad(n){return String(n).padStart(2,"0");}
  return {h:pad(h),m:pad(m),s:pad(s),total:t};
}

    if(p==="biz-onboard"){setPage("biz-onboard");window.scrollTo({top:0,behavior:"smooth"});return;}
    if(p==="dashboard"){if(!user){setPage("login");return;}if(user.role==="admin")setPage("admin");else if(user.role==="business")setPage("bizDash");else setPage("dash");window.scrollTo({top:0,behavior:"smooth"});return;}
    if(p==="account"){if(!user){setPage("login");return;}if(user.role==="admin")setPage("admin");else if(user.role==="business")setPage("bizDash");else setPage("dash");window.scrollTo({top:0,behavior:"smooth"});return;}
    setPage(p);window.scrollTo({top:0,behavior:"smooth"});
  }
  function renderPage(){
    if(page==="home")        return React.createElement(HomePage,       {go:go,setBiz:setSelBiz});
    if(page==="listings")    return React.createElement(ListingsPage,   {go:go,setBiz:setSelBiz});
    if(page==="detail")      return React.createElement(DetailPage,     {b:selBiz,go:go});
    if(page==="login")       return React.createElement(AuthPage,       {setUser:setUser,go:go});
    if(page==="biz-onboard") return React.createElement(BusinessOnboard,{setUser:setUser,go:go});
    if(page==="dash")        return user?React.createElement(UserDash,  {user:user,go:go}):React.createElement(AuthPage,{setUser:setUser,go:go});
    if(page==="bizDash")     return user?React.createElement(BizDash,   {user:user,go:go}):React.createElement(AuthPage,{setUser:setUser,go:go});
    if(page==="admin")       return user&&user.role==="admin"?React.createElement(AdminPanel,null):React.createElement(AuthPage,{setUser:setUser,go:go});
    return React.createElement(HomePage,{go:go,setBiz:setSelBiz});
  }
  return React.createElement("div",null,
    React.createElement(TopBar,    {page:page,go:go,user:user,setUser:setUser}),
    React.createElement("main",    null,renderPage()),
    React.createElement(BottomNav, {page:page,go:go,user:user}),
    chatOpen&&React.createElement(AiChat,{onClose:function(){setChatOpen(false);}}),
    (page==="home"||page==="listings")&&React.createElement("button",{className:"fab",onClick:function(){go("biz-onboard");}},"\uD83C\uDFEA")
  );
}

/* MOUNT */
var root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App,null));
</script>
</body>
